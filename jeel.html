<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO Dashboard | NJ Real Estate</title>
    <style>
        :root {
            --gold: #C5A059;
            --dark: #050505;
            --panel: #111111;
            --text: #E0E0E0;
            --accent: #1a1a1a;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; display: flex; }

        .sidebar { width: 280px; height: 100vh; background: var(--panel); border-right: 1px solid var(--gold); padding: 40px 20px; position: fixed; }
        .sidebar h2 { color: var(--gold); letter-spacing: 4px; font-size: 1.4rem; text-transform: uppercase; margin-bottom: 5px; }

        .nav-item { padding: 15px; margin: 15px 0; cursor: pointer; border-radius: 4px; transition: 0.3s; color: #888; letter-spacing: 1px; font-size: 0.9rem; }
        .nav-item.active { background: rgba(197, 160, 89, 0.1); color: var(--gold); border-left: 4px solid var(--gold); }

        .main-content { margin-left: 320px; padding: 40px; width: calc(100% - 360px); }
        .dashboard-header { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }

        .admin-card { background: var(--panel); padding: 30px; border: 1px solid #222; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .admin-card h3 { color: var(--gold); margin-top: 0; font-weight: 300; letter-spacing: 2px; }

        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        
        label { display: block; font-size: 0.75rem; color: #666; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px;}

        input, select { width: 100%; padding: 12px; background: var(--accent); border: 1px solid #333; color: white; border-radius: 2px; box-sizing: border-box; }
        
        /* THE PASTE ZONE STYLE */
        #paste-zone {
            width: 100%;
            height: 100px;
            border: 2px dashed #333;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-align: center;
            font-size: 0.9rem;
        }
        #paste-zone.active { border-color: var(--gold); color: var(--gold); background: rgba(197, 160, 89, 0.05); }
        #preview-img { max-height: 80px; display: none; margin-top: 10px; border: 1px solid var(--gold); }

        .btn-publish { background: var(--gold); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-publish:hover { background: #e2bd7e; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--gold); padding: 15px; border-bottom: 2px solid #222; font-size: 0.8rem; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }

        .action-btn { color: #ff4d4d; cursor: pointer; font-size: 0.8rem; }
        #leads-section { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>NJ ADMIN</h2>
        <p style="color: #444; font-size: 0.75rem; margin-top: -5px; margin-bottom: 40px;">MANAGEMENT PORTAL</p>
        <nav>
            <div id="nav-inv" class="nav-item active" onclick="switchTab('inventory')">● INVENTORY MANAGER</div>
            <div id="nav-leads" class="nav-item" onclick="switchTab('leads')">● CUSTOMER LEADS</div>
        </nav>
    </div>

    <div class="main-content">
        <div class="dashboard-header">
            <h1 style="font-weight: 300;">Proprietor Dashboard</h1>
            <div id="date-display" style="color: #666; font-size: 0.8rem;"></div>
        </div>

        <div id="inventory-section">
            <div class="admin-card">
                <h3>Add New Property</h3>
                <form id="addPropertyForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Property Name</label>
                            <input type="text" id="propTitle" placeholder="e.g. Royal Estate" required>
                        </div>
                        <div class="form-group">
                            <label>Exact Location</label>
                            <input type="text" id="propLocation" placeholder="e.g. Mehsana, Gujarat" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="propType" onchange="toggleBhkOption()">
                                <option value="Villas">Villa / Estate</option>
                                <option value="Farmhouse">Farmhouse</option>
                                <option value="Flats">Luxury Flats</option>
                                <option value="Landscapes">Landscape / Plots</option>
                                <option value="Dubai">Dubai Portfolio</option>
                                <option value="Canada">Canada Portfolio</option>
                            </select>
                        </div>
                        <div class="form-group" id="bhk-container" style="display:none;">
                            <label>Configuration</label>
                            <select id="propBhk">
                                <option value="2BHK">2 BHK</option><option value="3BHK">3 BHK</option><option value="4BHK">4 BHK</option><option value="5BHK">5 BHK</option><option value="6BHK">6 BHK</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Property Photo</label>
                            <div id="paste-zone">CLICK HERE & PASTE PHOTO (Ctrl+V)</div>
                            <img id="preview-img" alt="Preview">
                        </div>
                    </div>
                    <button type="submit" class="btn-publish">Update Global Portfolio</button>
                </form>
            </div>

            <div class="admin-card">
                <h3>Live Inventory</h3>
                <table>
                    <thead>
                        <tr><th>Property</th><th>Category</th><th>Location</th><th>Action</th></tr>
                    </thead>
                    <tbody id="inventoryBody"></tbody>
                </table>
            </div>
        </div>

        <div id="leads-section">
            <div class="admin-card">
                <h3>Recent Inquiries</h3>
                <table>
                    <thead><tr><th>Time</th><th>Client Name</th><th>WhatsApp</th><th>Interested In</th></tr></thead>
                    <tbody id="leadsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date-display').innerText = new Date().toDateString().toUpperCase();
        let pastedImageData = "";

        // PASTE LOGIC
        const pasteZone = document.getElementById('paste-zone');
        const previewImg = document.getElementById('preview-img');

        window.addEventListener('paste', e => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = event => {
                        pastedImageData = event.target.result;
                        previewImg.src = pastedImageData;
                        previewImg.style.display = "block";
                        pasteZone.innerText = "PHOTO ATTACHED";
                        pasteZone.classList.add('active');
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        function switchTab(tab) {
            document.getElementById('inventory-section').style.display = tab === 'inventory' ? 'block' : 'none';
            document.getElementById('leads-section').style.display = tab === 'leads' ? 'block' : 'none';
            document.getElementById('nav-inv').classList.toggle('active', tab === 'inventory');
            document.getElementById('nav-leads').classList.toggle('active', tab === 'leads');
            if(tab === 'leads') updateLeadsTable();
        }

        function toggleBhkOption() {
            document.getElementById('bhk-container').style.display = (document.getElementById('propType').value === 'Flats') ? 'block' : 'none';
        }

        let properties = JSON.parse(localStorage.getItem('nj_properties')) || [];

        function updateInvTable() {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = properties.length ? '' : '<tr><td colspan="4" style="text-align:center; color:#444;">No active listings.</td></tr>';
            properties.forEach((p, i) => {
                body.innerHTML += `<tr><td><strong>${p.title}</strong></td><td style="color:var(--gold);">${p.type}</td><td>${p.location}</td><td><a class="action-btn" onclick="deleteProp(${i})">Remove</a></td></tr>`;
            });
        }

        document.getElementById('addPropertyForm').onsubmit = function(e) {
            e.preventDefault();
            if(!pastedImageData) { alert("Please paste a photo first!"); return; }
            
            const newProp = {
                title: document.getElementById('propTitle').value,
                location: document.getElementById('propLocation').value,
                type: document.getElementById('propType').value,
                bhk: (document.getElementById('propType').value === 'Flats') ? document.getElementById('propBhk').value : '',
                img: pastedImageData // The actual photo data is stored here
            };
            properties.push(newProp);
            localStorage.setItem('nj_properties', JSON.stringify(properties));
            
            // Reset
            this.reset();
            pastedImageData = "";
            previewImg.style.display = "none";
            pasteZone.innerText = "CLICK HERE & PASTE PHOTO (Ctrl+V)";
            pasteZone.classList.remove('active');
            updateInvTable();
            alert("Property Published with Photo!");
        };

        function deleteProp(i) {
            if(confirm("Delete this listing?")) {
                properties.splice(i, 1);
                localStorage.setItem('nj_properties', JSON.stringify(properties));
                updateInvTable();
            }
        }

        function updateLeadsTable() {
            const leads = JSON.parse(localStorage.getItem('nj_leads')) || [];
            const body = document.getElementById('leadsBody');
            body.innerHTML = leads.length ? '' : '<tr><td colspan="4" style="text-align:center; color:#444;">No inquiries.</td></tr>';
            leads.slice().reverse().forEach(l => {
                body.innerHTML += `<tr><td>${l.time}</td><td>${l.name}</td><td><a href="https://wa.me/${l.phone}" target="_blank" style="color:var(--gold); text-decoration:none;">📱 ${l.phone}</a></td><td>${l.property}</td></tr>`;
            });
        }

        updateInvTable();
    </script>
</body>
</html>
